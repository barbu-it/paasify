name: Release workflow

on:
  push:
    branches:
      - "*-alpha"
      - "*-beta"
      - "*-rc"
    # branches-ignore:
    #   - "*-alpha"
    #   - "*-beta"
    #   - "*-rc"


  # pull_request:
  #   branches:
  #     - main
  #     - develop

  # workflow_run:
  #   workflows:
  #     - Test workflow
  #   types:
  #     - completed
  #   branches:
  #     - "*-alpha"
  #     - "*-beta"
  #     - "*-rc"


  workflow_dispatch:
    inputs:

      prerelease:
        description: 'Prerelease type: alpha, beta, rc or empty for stable'
        default: "alpha"

        #type: string
        
        type: choice
        options:
          - alpha
          - beta
          - rc
          - ""

      increment:
        description: 'Increment type: MAJOR, MINOR or PATCH '
        default: "PATCH"

        #type: string

        type: choice
        options:
          - MAJOR
          - MINOR
          - PATCH

      changelog:
        description: 'Generate Changelog'
        type: boolean
        default: true


# defaults:
#   run:
#     shell: bash
#     working-directory: prj


jobs:


  install:
    runs-on: ubuntu-latest
    steps:
    
      # Install build env
      - name: Set up Python 3
        uses: actions/setup-python@v4
        with:
          python-version: 3.9
      
      - name: Load cached env
        id: cached-env-install
        uses: actions/cache@v3
        with:
          path: ~/.local
          key: dev_env-${{ runner.os }}-3.9

      - name: Install virtualenv and poetry (cached)
        if: steps.cached-env-install.outputs.cache-hit != 'true'
        run: |
          set -x
          python -m pip install --upgrade pip virtualenv 
          virtualenv ~/.venv

          source ~/.venv/bin/activate
          pip install --upgrade poetry==1.2.1
          poetry config virtualenvs.path ~/.venv
          poetry config virtualenvs.in-project false
          poetry config virtualenvs.create false
          

      # Install project        
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          submodules: true

      - name: Load cached venv
        id: cached-project-deps
        uses: actions/cache@v3
        with:
          path: ~/.venv
          key: venv-${{ runner.os }}-3.9-${{ hashFiles('**/poetry.lock') }}
        
      - name: Install project dependencies (cached)
        if: steps.cached-project-deps.outputs.cache-hit != 'true'
        run: |
          source ~/.venv/bin/activate
          poetry install -vv --no-interaction --no-root
      
      - name: Install project
        run: |
          source ~/.venv/bin/activate
          poetry install -vv --no-interaction --only-root

  release:
    needs: install
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'bump:')"

    # defaults:
    #   run:
    #     working-directory: ./work/paasify/paasify

    steps:

      # Load project        
      - name: Load cached venv
        id: cached-project-deps
        uses: actions/cache@v3
        with:
          path: ~/.venv
          key: venv-${{ runner.os }}-3.9-${{ hashFiles('**/poetry.lock') }}
        
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          submodules: true

      # Bump dist project
      # -----------------------------

      - id: release
        run: |2
          BRANCH=${GITHUB_REF#refs/heads/}
          prerelease="${{github.event.inputs.prerelease}}"
          case "$BRANCH" in
            *-alpha) prerelease=alpha ;;
            *-beta) prerelease=beta ;;
            *-rc) prerelease=rc ;;
          esac

          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"



      - id: cz
        name: Create bump and changelog
        uses: commitizen-tools/commitizen-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          #prerelease: ${{github.event.inputs.prerelease}}
          prerelease: ${{steps.release.outputs.prerelease}}
          changelog: ${{github.event.inputs.changelog}}
          increment: ${{github.event.inputs.increment}}
          changelog_increment_filename: body.md

      - name: Print Version
        run: |
          echo "Bumped to version ${{ steps.cz.outputs.version }}"
          echo "Project version: poetry version -s)"
          echo "Paasify version: paasify --version)"


      # Create sdist
      # -----------------------------
      - name: Build paasify release
        run: |
          set -x
          source ~/.venv/bin/activate
          poetry build -vvv



      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          token: "${{ secrets.ACCESS_TOKEN }}"
          body_path: "body.md"
          prerelease: true
          #draft: true
          name: "Latest ${{steps.release.outputs.prerelease}} build: ${{steps.cz.outputs.version}}"
          tag_name: "${{steps.cz.outputs.version}}"
          files: |
            LICENSE.txt
            CHANGELOG.md
            dist/*.whl
            dist/*.tar.gz

