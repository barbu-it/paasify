name: Create dev release

env:
  python_version: "3.9"
  poetry_version: "1.2.1"


on:

  workflow_dispatch:
    inputs:

      increment:
        description: 'Increment type: MAJOR, MINOR, PATCH or AUTO'
        default: "AUTO"
        type: choice
        options:
          - AUTO
          - MAJOR
          - MINOR
          - PATCH

      prerelease:
        description: 'Prerelease type: alpha, beta, rc or empty for stable'
        default: "alpha"
        type: choice
        options:
          - alpha
          - beta
          - rc

      changelog:
        description: 'Generate Changelog'
        type: boolean
        default: true


jobs:

  install:
    
    strategy:
      fail-fast: false
    with:
      python_version: '3.9'
      poetry_version: '1.2.1'
    secrets:
      access_token: "${{ secrets.ACCESS_TOKEN }}"

    uses: ./.github/workflows/_install.yaml
  release:
    needs: install
    runs-on: ubuntu-latest

    if: "!startsWith(github.event.head_commit.message, 'bump:')"
    steps:

      # Load project
      # ---------------------
      - name: Load cached python environment
        id: cached-env-install
        uses: actions/cache@v3
        with:
          path: ~/.local
          key: python_env--${{ runner.os }}--${{env.python_version}}--${{env.poetry_version}}

      - name: Fetch source code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          submodules: true

      - name: Load cached venv
        id: cached-project-deps
        uses: actions/cache@v3
        with:
          path: ~/.venv
          key: venv--${{ runner.os }}--${{env.python_version}}--${{env.poetry_version}}--${{ hashFiles('**/poetry.lock') }}
        


      # Bump dist project
      # -----------------------------

      - id: release
        run: |2
          BRANCH=${GITHUB_REF_NAME}

          prerelease=''
          if [[ "${{github.event.inputs.prerelease}}" != 'AUTO' ]]; then
            prerelease="${{github.event.inputs.prerelease}}"
          fi
          case "$BRANCH" in
            *-alpha) prerelease=alpha ;;
            *-beta) prerelease=beta ;;
            *-rc) prerelease=rc ;;
          esac

          if [[ "$prerelease" != "${{github.event.inputs.prerelease}}" ]]; then
            echo "Change pre-release because of branch name: '$BRANCH'"
            echo "  ${{github.event.inputs.prerelease}} -> ${prerelease:-DISABLED}"
          fi
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"

      - id: cz
        name: Create bump and changelog
        uses: commitizen-tools/commitizen-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          changelog: ${{github.event.inputs.changelog}}
          prerelease: ${{steps.release.outputs.prerelease}}
          increment: ${{github.event.inputs.increment}}

      - name: Print Version
        run: |
          source ~/.venv/bin/activate
          echo "Bumped to version ${{ steps.cz.outputs.version }}"
          echo "Project version: $(poetry version -s)"
          echo "Paasify version: $(paasify --version)"

