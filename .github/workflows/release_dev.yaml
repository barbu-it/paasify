  #     - name: Install project
  #       run: |
  #         source ~/.venv/bin/activate
  #         poetry install -vv --no-interaction --only-root

  release:
    needs: install
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'bump:')"

    steps:

      # Load project        
      - name: Load cached venv
        id: cached-project-deps
        uses: actions/cache@v3
        with:
          path: ~/.venv
          key: venv-${{ runner.os }}-3.9-${{ hashFiles('**/poetry.lock') }}
        
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          fetch-depth: 0
          submodules: true

      # Bump dist project
      # -----------------------------

      - id: release
        run: |2
          BRANCH=${GITHUB_REF#refs/heads/}
          prerelease="${{github.event.inputs.prerelease}}"
          case "$BRANCH" in
            *-alpha) prerelease=alpha ;;
            *-beta) prerelease=beta ;;
            *-rc) prerelease=rc ;;
          esac

          if [[ "$prerelease" != "${{github.event.inputs.prerelease}}" ]]; then
            echo "Change pre-release because of branch name: '$BRANCH'"
            echo "  ${{github.event.inputs.prerelease}} -> ${prerelease}"
          fi
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"

      - id: cz
        name: Create bump and changelog
        uses: commitizen-tools/commitizen-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          changelog: ${{github.event.inputs.changelog}}
          prerelease: ${{steps.release.outputs.prerelease}}
          increment: ${{github.event.inputs.increment}}

      - name: Print Version
        run: |
          source ~/.venv/bin/activate
          echo "Bumped to version ${{ steps.cz.outputs.version }}"
          echo "Project version: $(poetry version -s)"
          echo "Paasify version: $(paasify --version)"

