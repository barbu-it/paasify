name: Create dev release

on:

  workflow_dispatch:
    inputs:

      prerelease:
        description: 'Prerelease type: alpha, beta, rc or empty for stable'
        default: "alpha"
        type: choice
        options:
          - alpha
          - beta
          - rc

      increment:
        description: 'Increment type: MAJOR, MINOR, PATCH or <empty>'
        default: ""
        type: choice
        options:
          - ""
          - MAJOR
          - MINOR
          - PATCH

      changelog:
        description: 'Generate Changelog'
        type: boolean
        default: true


jobs:

  install:
    uses: ./.github/workflows/_install.yaml
    strategy:
      fail-fast: false
    with:
      python_version: '3.9'
      poetry_version: '1.2.1'
    secrets:
      access_token: "${{ secrets.ACCESS_TOKEN }}"

