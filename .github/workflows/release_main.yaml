name: Release stable

on:
  push:
    branches:
      - main

jobs:


  install:
    runs-on: ubuntu-latest
    steps:
    
      # Install build env
      - name: Set up Python 3
        uses: actions/setup-python@v4
        with:
          python-version: 3.9
      
      - name: Load cached env
        id: cached-env-install
        uses: actions/cache@v3
        with:
          path: ~/.local
          key: dev_env-${{ runner.os }}-3.9

      - name: Install virtualenv and poetry (cached)
        if: steps.cached-env-install.outputs.cache-hit != 'true'
        run: |
          set -x
          python -m pip install --upgrade pip virtualenv 
          virtualenv ~/.venv

          source ~/.venv/bin/activate
          pip install --upgrade poetry==1.2.1
          poetry config virtualenvs.path ~/.venv
          poetry config virtualenvs.in-project false
          poetry config virtualenvs.create false
          

      # Install project        
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          submodules: true

      - name: Load cached venv
        id: cached-project-deps
        uses: actions/cache@v3
        with:
          path: ~/.venv
          key: venv-${{ runner.os }}-3.9-${{ hashFiles('**/poetry.lock') }}
        
      - name: Install project dependencies (cached)
        if: steps.cached-project-deps.outputs.cache-hit != 'true'
        run: |
          source ~/.venv/bin/activate
          poetry install -vv --no-interaction --no-root
      
      - name: Install project
        run: |
          source ~/.venv/bin/activate
          poetry install -vv --no-interaction --only-root

  release:
    needs: install
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'bump:')"

    steps:

      # Load project        
      - name: Load cached venv
        id: cached-project-deps
        uses: actions/cache@v3
        with:
          path: ~/.venv
          key: venv-${{ runner.os }}-3.9-${{ hashFiles('**/poetry.lock') }}
        
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          fetch-depth: 0
          submodules: true

      # Bump dist project
      # -----------------------------

      - id: cz
        name: Create bump and changelog
        uses: commitizen-tools/commitizen-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          changelog: true
          changelog_increment_filename: body.md
          dry_run: true

      - name: Print Version
        run: |
          cat body.md
          echo "Bumped to version ${{ steps.cz.outputs.version }}"
          echo "Project version: $(poetry version -s)"
          echo "Paasify version: $(paasify --version)"


      # Create sdist
      # -----------------------------
      - name: Build paasify release
        run: |
          set -x
          source ~/.venv/bin/activate
          poetry build -vvv

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          token: "${{ secrets.ACCESS_TOKEN }}"
          body_path: "body.md"
          prerelease: false
          name: "Latest stable build: ${{steps.cz.outputs.version}}"
          tag_name: "${{steps.cz.outputs.version}}"
          files: |
            LICENSE.txt
            CHANGELOG.md
            dist/*.whl
            dist/*.tar.gz

