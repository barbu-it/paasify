name: Install Paasify

on: 
  workflow_call:
    inputs:
      python_version:
        description: 'Version of python to use'
        required: true
        type: string
        default: "3.9"

      poetry_version:
        description: 'Version of Poetry to use'
        required: true
        type: string
        default: "1.2.1"

    secrets:
      access_token:
        description: 'Github Secret Token to check out the repo'


jobs:


  # Install Python and Poetry
  # =====================================
  install_python:
    runs-on: ubuntu-latest
      
    strategy:
      fail-fast: false
    steps:

    # - name: Show infos
    #   run: |
    #       echo "python_versions=$python_version"
    #       echo "poetry_versions=$poetry_version"


    # Install python and poetry
    # -----------------------------
    - name: Load cached poetry
      id: cached-poetry-install
      uses: actions/cache@v3
      with:
        path: ~/.local
        key: poetry-${{ runner.os }}-${{ inputs.python_version }}-${{ inputs.poetry_version }}

    - name: Set up Python ${{ inputs.python_version }}
      if: steps.cached-poetry-install.outputs.cache-hit != 'true'
      uses: actions/setup-python@v4
      with:
        python-version: ${{ inputs.python_version }}
        #cache: 'poetry'

    - name: Install Poetry ${{ inputs.poetry_version }} (cached)
      if: steps.cached-poetry-install.outputs.cache-hit != 'true'
      uses: snok/install-poetry@v1
      with:
        virtualenvs-create: true
        virtualenvs-in-project: true
        virtualenvs-path: .venv
        installer-parallel: true
        version: ${{ inputs.poetry_version }}


    # Prepare devel environment
    # -----------------------------
    - uses: actions/checkout@v3
      with:
        token: ${{ secrets.access_token }}
        submodules: true

    - name: Load cached venv
      id: cached-poetry-dependencies
      uses: actions/cache@v3
      with:
        path: .venv
        key: venv-${{ runner.os }}-${{ inputs.python_version }}-${{ inputs.poetry_version }}-${{ hashFiles('**/poetry.lock') }}

    - name: Install dependencies (cached)
      if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
      run: poetry install --no-interaction --no-root

    # - name: Debug Infos
    #   run: |
    #     set +eu
    #     echo "PATH=$PATH"
    #     echo PWD=$(pwd)
    #     echo "HOME=$HOME"

    #     whereis poetry || true
    #     python3 -m site

    #     echo "WORKING DIR"
    #     ls -ahl .
    #     echo "LOCAL"
    #     ls -ahl ~/.local/bin
    #     echo "VENV"
    #     ls -ahl .venv/bin




  # Install Paasify
  # =====================================
  install_paasify:
    runs-on: ubuntu-latest
    needs:
      - install_python
    # permissions:
    #   security-events: write
    strategy:
      fail-fast: false
    steps:

    # Load caches
    # -----------------------------

    - uses: actions/checkout@v3
      with:
        token: ${{ secrets.access_token }}
        submodules: true

    - name: Load cached poetry
      id: cached-poetry-install
      uses: actions/cache@v3
      with:
        path: ~/.local
        key: poetry-${{ runner.os }}-${{ inputs.python_version }}-${{ inputs.poetry_version }}

    - name: Load cached venv
      id: cached-poetry-dependencies
      uses: actions/cache@v3
      with:
        path: .venv
        key: venv-${{ runner.os }}-${{ inputs.python_version }}-${{ inputs.poetry_version }}-${{ hashFiles('**/poetry.lock') }}

    - name: Load cached project
      id: cached-poetry-project
      uses: actions/cache@v3
      with:
        path: .
        key: prj-${{ runner.os }}-${{ inputs.python_version }}-${{ inputs.poetry_version }}-${{ hashFiles('**') }}


    # Install project
    # -----------------------------
    - name: Install paasify
      if: steps.cached-poetry-project.outputs.cache-hit != 'true'
      run: |
        source .venv/bin/activate
        poetry install --no-interaction


